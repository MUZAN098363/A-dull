<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P90X ELITE - OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --primary: #ff4500;
            --venom: #8a2be2;
            --gold: #ffd700;
            --online: #00ff00;
            --card-bg: rgba(10, 10, 10, 0.98);
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; background: #000;
            color: white; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-y: auto; padding: 20px 0;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)), 
                        url('https://medieval-teal-n9ythknuvr.edgeone.app/itachi-uchiha-moon-3840x2160-25777.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        .main-card {
            background: var(--card-bg); padding: 25px;
            border: 1px solid #222; border-radius: 20px;
            text-align: center; width: 90%; max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }

        input {
            width: 100%; padding: 14px; margin: 10px 0;
            background: #151515; border: 1px solid #333; color: white; 
            border-radius: 10px; text-align: center; box-sizing: border-box;
        }

        /* --- GLOBAL CHAT UI --- */
        #chat-window {
            position: fixed; bottom: 85px; right: 20px; width: 300px; height: 400px;
            background: #0a0a0a; border: 1px solid var(--primary); border-radius: 15px;
            display: flex; flex-direction: column; overflow: hidden; z-index: 9999;
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.4);
        }

        #chat-header { background: var(--primary); padding: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.75rem; display: flex; flex-direction: column; gap: 10px; background: #000; }
        
        .msg-container { display: flex; flex-direction: column; max-width: 85%; }
        .msg-user-name { font-size: 0.6rem; color: var(--gold); margin-bottom: 2px; }
        .msg-text { padding: 8px 12px; border-radius: 12px; word-wrap: break-word; color: white; }
        
        .msg-left { align-self: flex-start; }
        .msg-left .msg-text { background: #222; border-bottom-left-radius: 2px; }
        .msg-right { align-self: flex-end; text-align: right; }
        .msg-right .msg-text { background: var(--primary); border-bottom-right-radius: 2px; }

        .chat-input-box { display: flex; padding: 8px; background: #111; border-top: 1px solid #222; }
        .chat-input-box input { margin: 0; padding: 10px; text-align: left; background: #1a1a1a; font-size: 0.8rem; border-radius: 5px 0 0 5px; }
        .chat-send-btn { background: var(--primary); border: none; padding: 0 15px; border-radius: 0 5px 5px 0; cursor: pointer; color: white; }

        .chat-toggle-btn {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
            background: var(--primary); border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 24px;
            cursor: pointer; z-index: 10000; box-shadow: 0 0 15px var(--primary);
        }

        /* --- DASHBOARD STYLES --- */
        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .service-btn { background: #1a1a1a; border: 1px solid #333; padding: 15px 5px; border-radius: 12px; font-size: 0.7rem; cursor: pointer; color: #fff; }
        .service-btn i { font-size: 1.1rem; color: var(--primary); margin-bottom: 5px; display: block; }
        
        .detail-box { background: rgba(255, 69, 0, 0.05); border: 1px solid #333; margin-top: 15px; padding: 15px; border-radius: 10px; text-align: left; font-size: 0.8rem; }
        
        .social-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; }
        .social-icon { font-size: 24px; }
        .wa { color: #25D366; } .yt { color: #FF0000; } .ig { color: #E1306C; }

        .btn-glow { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>

    <div class="chat-toggle-btn" onclick="toggleChat()">
        <i class="fas fa-users"></i>
    </div>

    <div id="chat-window" class="hidden">
        <div id="chat-header">
            <span>Global Elite Chat</span>
            <i class="fas fa-times" onclick="toggleChat()" style="cursor:pointer"></i>
        </div>
        <div id="chat-messages">
            </div>
        <div class="chat-input-box">
            <input type="text" id="global-msg-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendGlobalMessage()">
            <button class="chat-send-btn" onclick="sendGlobalMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="login-screen" class="main-card">
        <h2 style="color: var(--primary);">P90X ELITE</h2>
        <input type="email" id="l-mail" placeholder="Gmail Address">
        <input type="password" id="l-pass" placeholder="Password">
        <button class="btn-glow btn-primary" onclick="handleAuth('login')">LOGIN</button>
        <p style="font-size:0.75rem; cursor:pointer" onclick="toggleScreens('login-screen', 'signup-screen')">Register New Account</p>
    </div>

    <div id="signup-screen" class="main-card hidden">
        <h2 style="color: var(--primary);">REGISTER</h2>
        <input type="text" id="s-name" placeholder="Full Name">
        <input type="email" id="s-mail" placeholder="Email">
        <input type="password" id="s-pass" placeholder="Password">
        <input type="file" id="s-pic-file" accept="image/*" style="display:none" onchange="previewFile()">
        <label for="s-pic-file" style="display:block; border:1px dashed #444; padding:12px; margin:10px 0; border-radius:10px; cursor:pointer; font-size:0.7rem">Upload Profile Pic</label>
        <button class="btn-glow btn-primary" onclick="handleAuth('signup')">CREATE ACCOUNT</button>
    </div>

    <div id="user-dash" class="main-card hidden">
        <img id="display-user-pic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="user-pic-circle" style="width:80px; height:80px; border-radius:50%; margin: 0 auto 10px;">
        <h3 id="display-user-name" style="margin: 0; color: var(--gold);">User</h3>
        
        <div class="service-grid">
            <div class="service-btn" onclick="toggleBox('player-details')"><i class="fas fa-user"></i> PLAYER</div>
            <div class="service-btn" onclick="toggleBox('uk-tiktok')"><i class="fab fa-tiktok"></i> UK TIKTOK</div>
            <div class="service-btn" onclick="toggleBox('num-details')"><i class="fas fa-id-card"></i> NUM INFO</div>
            <div class="service-btn" onclick="toggleChat()"><i class="fas fa-comments"></i> GROUP CHAT</div>
        </div>

        <div id="player-details" class="detail-box hidden">
            <b>Grade 12 Student</b><br>
            <b>Python & Web Dev</b><br>
            <b>FF Rank: Master</b>
        </div>

        <div id="uk-tiktok" class="detail-box hidden">UK Monetized Accounts & Sim Available.</div>
        <div id="num-details" class="detail-box hidden">CNIC & Tracker Fresh DB 2026.</div>

        <div class="social-container">
            <a href="https://wa.me/923134004221" class="social-icon wa"><i class="fab fa-whatsapp"></i></a>
            <a href="https://youtube.com/@p90xaim" class="social-icon yt"><i class="fab fa-youtube"></i></a>
            <a href="https://instagram.com/Abdullah.empire" class="social-icon ig"><i class="fab fa-instagram"></i></a>
        </div>

        <button class="btn-glow" style="background:#222; color:#ff4444; border:1px solid #444" onclick="location.reload()">LOGOUT</button>
    </div>

    <script>
        emailjs.init("XWz36002KPluD_AVT");
        let currentUser = "Guest";
        let accounts = JSON.parse(localStorage.getItem('p90x_accounts')) || [];
        
        // --- CHAT SYSTEM LOGIC ---
        function toggleChat() { document.getElementById('chat-window').classList.toggle('hidden'); loadMessages(); }

        function sendGlobalMessage() {
            const input = document.getElementById('global-msg-input');
            const msgText = input.value.trim();
            if(!msgText) return;

            let messages = JSON.parse(localStorage.getItem('p90x_global_chat')) || [];
            messages.push({ user: currentUser, text: msgText, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
            
            localStorage.setItem('p90x_global_chat', JSON.stringify(messages));
            input.value = "";
            loadMessages();
        }

        function loadMessages() {
            const container = document.getElementById('chat-messages');
            const messages = JSON.parse(localStorage.getItem('p90x_global_chat')) || [];
            
            container.innerHTML = messages.map(m => `
                <div class="msg-container ${m.user === currentUser ? 'msg-right' : 'msg-left'}">
                    <span class="msg-user-name">${m.user} • ${m.time}</span>
                    <div class="msg-text">${m.text}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        // Real-time update (checks for new messages every 2 seconds)
        setInterval(() => { if(!document.getElementById('chat-window').classList.contains('hidden')) loadMessages(); }, 2000);

        // --- AUTH LOGIC ---
        function handleAuth(type) {
            const email = (type === 'login') ? document.getElementById('l-mail').value : document.getElementById('s-mail').value;
            const pass = (type === 'login') ? document.getElementById('l-pass').value : document.getElementById('s-pass').value;

            if(type === 'login') {
                const u = accounts.find(a => a.email === email && a.pass === pass);
                if(u) { currentUser = u.name; enterDash(u.pic, u.name); } 
                else if(email === "aoitodo12356@gmail.com") { currentUser = "Admin Abdullah"; enterDash("", "Admin Abdullah"); }
                else alert("Wrong Login!");
            } else {
                const name = document.getElementById('s-name').value;
                accounts.push({ name, email, pass, pic: window.tempPic || "" });
                localStorage.setItem('p90x_accounts', JSON.stringify(accounts));
                alert("Account Created! Please Login.");
                location.reload();
            }
        }

        function previewFile() {
            const reader = new FileReader();
            reader.onloadend = () => { window.tempPic = reader.result; };
            reader.readAsDataURL(document.getElementById('s-pic-file').files[0]);
        }

        function enterDash(pic, name) {
            document.querySelectorAll('.main-card').forEach(c => c.classList.add('hidden'));
            document.getElementById('user-dash').classList.remove('hidden');
            if(pic) document.getElementById('display-user-pic').src = pic;
            document.getElementById('display-user-name').innerText = name;
        }

        function toggleScreens(h, s) { document.getElementById(h).classList.add('hidden'); document.getElementById(s).classList.remove('hidden'); }
        function toggleBox(id) { document.querySelectorAll('.detail-box').forEach(b => b.classList.add('hidden')); document.getElementById(id).classList.toggle('hidden'); }
    </script>
</body>
</html>
